<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#3b82f6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" rx="20"/>

  <!-- Grid overlay -->
  <g opacity="0.03">
    <line x1="0" y1="30" x2="1200" y2="30" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="60" x2="1200" y2="60" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="90" x2="1200" y2="90" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="1200" y2="120" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="1200" y2="150" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="180" x2="1200" y2="180" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="210" x2="1200" y2="210" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="270" x2="1200" y2="270" stroke="white" stroke-width="0.5"/>
  </g>

  <!-- Glow orbs -->
  <ellipse cx="600" cy="150" rx="400" ry="150" fill="url(#glow)" opacity="0.6"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)" rx="2"/>

  <!-- Compass icon centered above title -->
  <g transform="translate(570, 50)">
    <circle cx="30" cy="30" r="28" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.3"/>
    <circle cx="30" cy="30" r="24" fill="#38bdf8" fill-opacity="0.08" stroke="url(#accent)" stroke-width="1.5"/>
    <polygon points="30,8 34,26 52,30 34,34 30,52 26,34 8,30 26,26" fill="url(#accent)" opacity="0.9"/>
  </g>

  <!-- Title centered -->
  <text x="600" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="bold" fill="url(#title)" letter-spacing="-1">
    VoyagerAI
  </text>

  <!-- Subtitle centered -->
  <text x="600" y="210" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8" letter-spacing="2" opacity="0.8">
    AI-POWERED TRAVEL PLANNING
  </text>

  <!-- Badge centered -->
  <rect x="530" y="227" width="140" height="24" rx="12" fill="#38bdf8" fill-opacity="0.1" stroke="#38bdf8" stroke-opacity="0.3" stroke-width="0.8"/>
  <circle cx="545" cy="239" r="3" fill="#38bdf8"/>
  <text x="554" y="244" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#38bdf8" font-weight="500" letter-spacing="0.5">Powered by Gemini</text>

  <!-- Left decorative -->
  <g transform="translate(180, 105)" opacity="0.3">
    <rect x="0" y="0" width="50" height="50" rx="10" fill="none" stroke="#38bdf8" stroke-opacity="0.15" stroke-width="1"/>
    <g transform="translate(14, 14)">
      <line x1="0" y1="11" x2="22" y2="11" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
      <line x1="0" y1="5" x2="22" y2="5" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
      <line x1="11" y1="0" x2="11" y2="22" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    </g>
  </g>

  <!-- Right decorative -->
  <g transform="translate(970, 105)" opacity="0.3">
    <rect x="0" y="0" width="50" height="50" rx="10" fill="none" stroke="#38bdf8" stroke-opacity="0.15" stroke-width="1"/>
    <g transform="translate(14, 14)">
      <line x1="0" y1="11" x2="22" y2="11" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
      <line x1="0" y1="5" x2="22" y2="5" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
      <line x1="11" y1="0" x2="11" y2="22" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    </g>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="297" width="1200" height="3" fill="url(#accent)" rx="2"/>
</svg>
